services:
  postgres:
    image: postgres:17-alpine
    container_name: deci-duel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: deci_duel
      POSTGRES_PASSWORD: deci1234
      POSTGRES_DB: deci_duel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deci_duel -d deci_duel"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
