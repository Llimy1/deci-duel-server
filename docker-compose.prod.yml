# 프로덕션 배포용 Docker Compose (EC2 + RDS + Cloudflare Origin Certificate)
# PostgreSQL은 RDS(외부) 사용 — 여기서 포함하지 않음
# SSL: Cloudflare Origin Certificate (Certbot 불필요)
#
# 최초 시작: ./init.sh
# 이후 업데이트: ./deploy.sh
#
# 환경변수: .env 파일 필수 (.env.example 참고)
#   DATABASE_URL — RDS PostgreSQL 연결 문자열
#   CORS_ALLOWED_ORIGINS=https://deciduel.com,https://www.deciduel.com

services:
  nginx:
    image: nginx:alpine
    container_name: deci-duel-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - nestjs

  nestjs:
    build:
      context: .
      dockerfile: Dockerfile
    image: deci-duel-server:latest
    container_name: deci-duel-app
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
