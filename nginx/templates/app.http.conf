# Phase 1: SSL 인증서 발급 전 임시 HTTP-only 설정
# init-ssl.sh Phase 1에서 nginx/conf.d/app.conf로 복사하여 사용
# certbot HTTP-01 challenge + NestJS 임시 프록시

server {
    listen 80;
    server_name api.deciduel.com;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 임시: NestJS로 프록시 (인증서 발급 전)
    location / {
        proxy_pass         http://nestjs:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         'upgrade';
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
