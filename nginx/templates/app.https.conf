# Phase 2: SSL 인증서 발급 완료 후 HTTPS 설정
# init-ssl.sh Phase 2에서 nginx/conf.d/app.conf로 복사하여 사용

# HTTP → HTTPS 리다이렉트 + Let's Encrypt 갱신 경로 유지
server {
    listen 80;
    server_name api.deciduel.com;

    # certbot 자동 갱신을 위해 HTTP-01 경로 유지
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 서버
server {
    listen 443 ssl;
    server_name api.deciduel.com;

    ssl_certificate     /etc/letsencrypt/live/api.deciduel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.deciduel.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 프로필 이미지 등 업로드 허용 크기
    client_max_body_size 10M;

    # WebSocket + HTTP proxy (Socket.io 포함)
    location / {
        proxy_pass         http://nestjs:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         'upgrade';
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
