# Cloudflare Origin Certificate 기반 HTTPS 설정
# (Certbot 불필요 — Cloudflare 프록시가 브라우저↔CF 구간 SSL 처리)
#
# 배치 전 확인:
#   nginx/certs/origin.pem — Cloudflare Origin Certificate
#   nginx/certs/origin.key — 개인 키

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name api.deciduel.com;
    return 301 https://$host$request_uri;
}

# HTTPS 서버
server {
    listen 443 ssl;
    server_name api.deciduel.com;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 프로필 이미지 등 업로드 허용 크기
    client_max_body_size 10M;

    # HTTP + WebSocket 프록시 (Socket.io 포함)
    location / {
        proxy_pass         http://nestjs:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         'upgrade';
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
